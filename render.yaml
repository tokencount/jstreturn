services:
  - type: web
    name: jstreturn
    runtime: python
    plan: starter
    region: singapore
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: bash -c "echo \"STARTING: ENV HAS DATABASE_URL=$(test -n \"$DATABASE_URL\" && echo yes || echo NO) SESSION_SECRET=$(test -n \"$SESSION_SECRET\" && echo yes || echo NO) PORT=$PORT\" >&2; uvicorn app.main:app --host 0.0.0.0 --port $PORT 2>&1"
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.7